kind = "web"
previewPath = "/"
title = "WizKids Carnival Analytics"
version = "1.0.0"
id = "artifacts/wkc-analytics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24118

[services.development]
run = "pnpm --filter @workspace/wkc-analytics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wkc-analytics", "run", "build" ]
publicDir = "artifacts/wkc-analytics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24118"
BASE_PATH = "/"
